name: Continuous Deployment (CD)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # Скачиваем код из репозитория в рабочую папку раннера (_work)
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync files and Deploy with Docker Compose
        run: |
          # Синхронизируем только чистый код, исключая .git и кэш раннера
          rsync -rtv --exclude='.git' --exclude='_work' . /var/www/soulbit/
          cd /var/www/soulbit/
          docker compose down --remove-orphans
          docker compose up --build -d